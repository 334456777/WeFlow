name: Native CLI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "resources/**"
      - "electron/assets/wasm/**"
      - ".github/workflows/native-cli.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "resources/**"
      - "electron/assets/wasm/**"
      - ".github/workflows/native-cli.yml"

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: weflow-windows-x64.exe
            binary: target/x86_64-pc-windows-msvc/release/weflow.exe
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: weflow-windows-arm64.exe
            binary: target/aarch64-pc-windows-msvc/release/weflow.exe
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: weflow-macos-arm64
            binary: target/aarch64-apple-darwin/release/weflow
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: weflow-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/weflow

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: Test host workspace
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release -p weflow-cli --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
